name: Build and Push Docker Image

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image
        run: docker build -t emr09/inos-bot:latest .

      - name: Push image
        run: docker push emr09/inos-bot:latest

      - name: Send Discord notification
        env:
          DISCORD_TOKEN: ${{ secrets.Discord_Token }}
          USER_IDS: "573903151472836609,1236358212152852582"
        run: |
          IFS=',' read -ra IDS <<< "$USER_IDS"

          for USER_ID in "${IDS[@]}"; do
            echo "Sending DM to $USER_ID"

            CHANNEL_ID=$(curl -s -X POST "https://discord.com/api/v10/users/@me/channels" \
              -H "Authorization: Bot $DISCORD_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"recipient_id\":\"$USER_ID\"}" | jq -r '.id')

            curl -s -X POST "https://discord.com/api/v10/channels/$CHANNEL_ID/messages" \
              -H "Authorization: Bot $DISCORD_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{
                "content": "Docker Image uploaded Successfully\nInos-Manager Code has a New Update"
              }'
          done
